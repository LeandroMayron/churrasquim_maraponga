pluginManagement {
    // Esta seção garante que o Gradle encontre os plugins do React Native e do Expo
    // de forma dinâmica e robusta, evitando caminhos fixos que quebram no EAS Build.
    includeBuild(new File(settingsDir, "node_modules/expo-modules-autolinking/expo-gradle-plugin"))
    includeBuild(new File(settingsDir, "node_modules/@react-native/gradle-plugin"))
}

plugins {
    // Aplica os plugins essenciais para o autolinking de módulos nativos.
    id "com.facebook.react.settings"
    id "expo.autolinking"
}

rootProject.name = 'churrasquim_maraponga'

// Aplica as configurações do React Native.
apply from: new File(project(":app").projectDir, "../node_modules/react-native/react.gradle")
// Aplica as configurações para módulos nativos da comunidade.
apply from: new File(project(":app").projectDir, "../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesSettingsGradle(settings)

include ':app'

// Habilita o autolinking do Expo para encontrar e incluir os módulos nativos.
useExpoModules()
